[pytest]
# pytest配置文件
# Issue #8: 单元测试覆盖

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试标记
markers =
    unit: 单元测试
    integration: 集成测试
    performance: 性能测试
    slow: 慢速测试

# 测试选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 测试超时
timeout = 300

