# 开发环境配置
# 覆盖默认配置，用于本地开发

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # 使用构建阶段，支持热重载
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - LOG_LEVEL=DEBUG
    command: >
      uvicorn apps.api.server:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    ports:
      - "8000:8000"
      - "5678:5678"  # 调试端口

  gpu-service:
    build:
      context: .
      dockerfile: Dockerfile.gpu
      target: builder
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - LOG_LEVEL=DEBUG
    command: >
      uvicorn apps.mocap.service:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug

  mysql:
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password_dev

  redis:
    ports:
      - "6379:6379"

  # 开发工具
  adminer:
    image: adminer
    container_name: mocap-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - mocap-network

  mailhog:
    image: mailhog/mailhog
    container_name: mocap-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - mocap-network
