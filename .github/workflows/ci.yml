# 大模型支持下的动作捕捉与视觉合成系统 V1.0
# GitHub Actions CI/CD 配置

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.10'
  CUDA_VERSION: '12.1.0'

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: 代码格式检查
      run: |
        black --check --diff easymocap/llm easymocap/vlm easymocap/performance easymocap/security easymocap/plugins apps/api tests --target-version py310
      continue-on-error: true
    
    - name: 导入排序检查
      run: |
        isort --check-only --diff easymocap/llm easymocap/vlm easymocap/performance easymocap/security easymocap/plugins apps/api tests --profile black
      continue-on-error: true
    
    - name: 代码风格检查
      run: |
        flake8 easymocap/llm easymocap/vlm easymocap/performance easymocap/security easymocap/plugins apps/api tests --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 easymocap/llm easymocap/vlm easymocap/performance easymocap/security easymocap/plugins apps/api tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: 类型检查
      run: |
        mypy easymocap/llm easymocap/vlm easymocap/performance easymocap/security easymocap/plugins apps/api --ignore-missing-imports --no-strict-optional
      continue-on-error: true

  # ==================== 单元测试 ====================
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-cov pytest-asyncio
        pip install numpy scipy opencv-python
        pip install -e .
    
    - name: 运行测试
      run: |
        pytest tests/ -v --cov=easymocap --cov-report=xml --cov-report=html
    
    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ==================== 构建测试 ====================
  build:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 安装构建工具
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
    
    - name: 构建包
      run: |
        python -m build
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  # ==================== Docker构建 ====================
  docker:
    name: Docker构建
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 登录Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: 构建并推送CPU镜像
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/mocap-system:latest
          ${{ secrets.DOCKER_USERNAME }}/mocap-system:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: 构建并推送GPU镜像
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.gpu
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/mocap-system:gpu-latest
          ${{ secrets.DOCKER_USERNAME }}/mocap-system:gpu-${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ==================== 部署 ====================
  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 部署到服务器
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/mocap-system
          git pull origin main
          docker-compose pull
          docker-compose up -d
          echo "部署完成"
