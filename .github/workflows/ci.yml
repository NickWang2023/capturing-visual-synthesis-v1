# 大模型支持下的动作捕捉与视觉合成系统 V1.0
# GitHub Actions CI/CD 配置

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: 代码风格检查
      run: |
        flake8 easymocap/llm easymocap/vlm easymocap/performance easymocap/security easymocap/plugins apps/api tests --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  # ==================== 单元测试 ====================
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-cov pytest-asyncio
        pip install numpy scipy opencv-python-headless
        pip install -e .
    
    - name: 运行测试
      run: |
        pytest tests/ -v --tb=short
      continue-on-error: true
